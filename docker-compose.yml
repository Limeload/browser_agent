version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: guardagent
      POSTGRES_PASSWORD: guardagent
      POSTGRES_DB: guardagent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guardagent"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
